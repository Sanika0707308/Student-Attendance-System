<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Attendance</title>
    <link rel="stylesheet" href="css/style.css?v=30">
</head>

<body>

    <app-sidebar></app-sidebar>

    <div class="main">
        <h1 class="page-title">Attendance</h1>

        <!-- INFO CARDS -->
        <div class="cards">
            <div class="card">
                <p>Total Students</p>
                <h2 id="total-students-count">—</h2>
            </div>
            <div class="card present">
                <p>Present</p>
                <h2 id="present-count">—</h2>
            </div>
            <div class="card absent">
                <p>Absent</p>
                <h2 id="absent-count">—</h2>
            </div>
        </div>

        <div class="table-box">
            <div class="table-header">
                <h3 id="table-date-header">Today's Attendance</h3>

                <div class="filters-box" style="display: flex; gap: 20px;">
                    <div class="date-box">
                        <label for="attendance-date">Select Date:</label>
                        <input type="date" id="attendance-date" onchange="filterAttendance()">
                    </div>

                    <div class="status-filter-box">
                        <label for="status-filter">Status:</label>
                        <select id="status-filter" onchange="filterAttendance()">
                            <option value="all">All Status</option>
                            <option value="In Time">In Time</option>
                            <option value="Late">Late</option>
                            <option value="Departure">Departure</option>
                            <option value="Absent">Absent</option>
                        </select>
                    </div>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>IN Time</th>
                        <th>OUT Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="attendance-table-body">
                    <tr>
                        <td colspan="4" style="text-align:center; color: var(--text-muted);">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/sidebar.js?v=30"></script>
    <script src="js/attendance.js?v=30"></script>

</body>

</html>
