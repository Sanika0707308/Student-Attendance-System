<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Attendance</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>

<body>

    <app-sidebar></app-sidebar>

    <div class="main">
        <h1 class="page-title">Attendance</h1>

        <div class="table-box">
            <div class="table-header">
                <h3>Today's Attendance</h3>
                <div class="filters-container" style="display: flex; gap: 15px; align-items: center;">
                    <div class="status-box">
                        <label for="attendance-status" style="margin-right: 5px;">Status:</label>
                        <select id="attendance-status" onchange="filterAttendance()" style="padding: 5px; border-radius: 4px; border: 1px solid var(--border-color, #ccc);">
                            <option value="All">All</option>
                            <option value="Present">Present</option>
                            <option value="Late">Late</option>
                            <option value="Left Early">Left Early</option>
                            <option value="Left">Left</option>
                            <option value="Absent">Absent</option>
                        </select>
                    </div>
                    <div class="date-box">
                        <label for="attendance-date" style="margin-right: 5px;">Select Date:</label>
                        <input type="date" id="attendance-date" onchange="filterAttendance()">
                    </div>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>IN Time</th>
                        <th>OUT Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="attendance-table-body">
                    <tr><td colspan="4" style="text-align:center; color: var(--text-muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/sidebar.js?v=3"></script>
    <script src="js/attendance.js?v=3"></script>
</body>

</html>
