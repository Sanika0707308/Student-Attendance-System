<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>

<body>

    <app-sidebar></app-sidebar>

    <div class="main">
        <h1 class="page-title">Students</h1>

        <!-- ADD STUDENT -->
        <div class="table-box" style="margin-bottom: 20px; padding: 20px;">
            <h3>Add New Student</h3>
            <form id="addStudentForm" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="student_name" placeholder="Student Name" required
                    style="flex: 1; min-width: 200px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <input type="text" id="zk_id" placeholder="ZK Machine ID" required
                    style="flex: 1; min-width: 150px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <input type="email" id="parent_email" placeholder="Parent Email" required
                    style="flex: 1; min-width: 200px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <button type="submit" class="btn-add" style="padding: 10px 20px;">Add Student</button>
            </form>
        </div>

        <!-- STUDENT TABLE -->
        <div class="table-box">
            <div class="table-header">
                <h3>Student List</h3>
                <div class="search-box">
                    <input type="text" id="student-search" placeholder="Search by ZK ID or Name..." onkeyup="searchStudents()">
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>ZK ID</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">
                    <tr>
                        <td colspan="5" style="text-align:center; color: var(--text-muted);">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ATTENDANCE REPORT MODAL -->
        <div id="attendance-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="width: 750px; padding: 0;">
                <div class="modal-header" style="padding: 20px; background: #222; color: white;">
                    <h2 id="modal-student-name">Student Attendance</h2>
                    <span onclick="closeAttendanceModal()" style="cursor:pointer;">&times;</span>
                </div>

                <div class="modal-body" style="padding: 20px;">
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <select id="report-month"></select>
                        <select id="report-year"></select>
                        <button onclick="downloadStudentPDF()" class="btn-mark">Download Report</button>
                    </div>

                    <div id="no-data-msg" style="display:none; color:red;">No data found</div>

                    <div id="modal-logs-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>In Time</th>
                                    <th>Out Time</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="modal-logs-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="js/jspdf.umd.min.js"></script>
    <script src="js/jspdf.plugin.autotable.min.js"></script>
    <script src="js/sidebar.js?v=SCORING-CLEANUP"></script>
    <script src="js/students.js?v=SCORING-CLEANUP"></script>

</body>

</html>
