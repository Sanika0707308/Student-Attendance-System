<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reports</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>

<body>

    <app-sidebar></app-sidebar>

    <div class="main">
        <h1 class="page-title">Reports</h1>

        <!-- INFO CARDS -->
        <div class="cards">
            <div class="card">
                <p>Total Working Days</p>
                <h2 id="total-days">—</h2>
            </div>

            <div class="card present">
                <p>Average Attendance</p>
                <h2 id="avg-attendance">—</h2>
            </div>

            <div class="card absent">
                <p>Average Absent</p>
                <h2 id="low-attendance">—</h2>
            </div>
        </div>

        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px; background: var(--card-bg); padding: 15px 20px; border-radius: var(--border-radius); border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);">
            <label for="report-month" style="font-weight: 600; color: var(--text-main);">Select Report Month:</label>
            <input type="month" id="report-month" onchange="loadReports()" style="padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 14px; outline: none; transition: var(--transition-std);">
        </div>

        <!-- EXPORT ACTION BUTTONS -->
        <div style="margin-bottom: 25px; display: flex; gap: 10px;">
            <button id="btn-export-csv" class="btn-mark"
                style="background-color: #28a745; border: none; padding: 10px 20px; color: white; border-radius: 5px; cursor: pointer;">📥
                Download Excel (CSV)</button>
            <button id="btn-export-pdf" class="btn-mark"
                style="background-color: #dc3545; border: none; padding: 10px 20px; color: white; border-radius: 5px; cursor: pointer;">📄
                Download PDF</button>
        </div>

        <!-- STUDENT ATTENDANCE TABLE -->
        <div class="table-box">
            <h3 id="table-report-title">Student Attendance Report</h3>

            <table>
                <thead>
                    <tr>
                        <th>ZK ID</th>
                        <th>Student Name</th>
                        <th>Days Present</th>
                        <th>Attendance %</th>
                    </tr>
                </thead>
                <tbody id="student-summary-body">
                    <tr><td colspan="4" style="text-align:center; color: var(--text-muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- PDF Generation Libraries -->
    <script src="js/jspdf.umd.min.js"></script>
    <script src="js/jspdf.plugin.autotable.min.js"></script>
    <script src="js/sidebar.js?v=3"></script>
    <script src="js/reports.js?v=3"></script>
</body>

</html>
