<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>

<body>

    <app-sidebar></app-sidebar>

    <div class="main">
        <h1 class="page-title">Students</h1>
        
        <div class="table-box" style="margin-bottom: 20px; padding: 20px;">
            <h3>Add New Student</h3>
            <form id="addStudentForm" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="student_name" placeholder="Student Name" required
                    style="flex: 1; min-width: 200px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <input type="text" id="zk_id" placeholder="ZK Machine ID" required
                    style="flex: 1; min-width: 150px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <input type="email" id="parent_email" placeholder="Parent Email" required
                    style="flex: 1; min-width: 200px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <button type="submit" class="btn-add" style="padding: 10px 20px;">Add Student</button>
            </form>
        </div>

        <div class="table-box">
            <div class="table-header">
                <h3>Student List</h3>
                <div class="search-box">
                    <input type="text" id="student-search" placeholder="Search by ZK ID or Name..." onkeyup="searchStudents()">
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>ZK ID</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">
                    <tr><td colspan="5" style="text-align:center; color: var(--text-muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Attendance Report Modal -->
        <div id="attendance-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="width: 750px; padding: 0; overflow: hidden; border: none; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);">
                <div class="modal-header" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; color: white; position: relative;">
                    <h2 id="modal-student-name" style="margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.01em;">Student Attendance</h2>
                    <p style="margin: 8px 0 0 0; opacity: 0.7; font-size: 14px;">Monthly summary and records</p>
                    <span class="close-modal" onclick="closeAttendanceModal()" style="position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: rgba(255,255,255,0.5); transition: color 0.2s;">&times;</span>
                </div>
                
                <div class="modal-body" style="padding: 30px; background: white; max-height: 85vh; overflow-y: auto;">
                    <div class="filter-row" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; margin-bottom: 30px; align-items: end;">
                        <div class="filter-item">
                            <label for="report-month" style="display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">Month</label>
                            <select id="report-month" class="input-field" style="width: 100%; height: 44px; background: #f1f5f9; border: 1px solid #e2e8f0; font-weight: 500;">
                                <option value="1">January</option>
                                <option value="2">February</option>
                                <option value="3">March</option>
                                <option value="4">April</option>
                                <option value="5">May</option>
                                <option value="6">June</option>
                                <option value="7">July</option>
                                <option value="8">August</option>
                                <option value="9">September</option>
                                <option value="10">October</option>
                                <option value="11">November</option>
                                <option value="12">December</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label for="report-year" style="display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">Year</label>
                            <select id="report-year" class="input-field" style="width: 100%; height: 44px; background: #f1f5f9; border: 1px solid #e2e8f0; font-weight: 500;">
                                <!-- Dynamically populated -->
                            </select>
                        </div>
                        <button class="btn-mark" onclick="downloadStudentPDF()" style="margin: 0; height: 44px; width: auto; padding: 0 20px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Report
                        </button>
                    </div>

                    <div id="no-data-msg" style="display: none; text-align: center; padding: 25px; color: #991b1b; font-weight: 600; font-size: 15px; background: #fef2f2; border-radius: 12px; margin-bottom: 25px; border: 1px solid #fee2e2; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);">
                        <div style="margin-bottom: 8px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        </div>
                        No attendance records found for this period.
                    </div>

                    <!-- Personal Attendance Summary -->
                    <div id="student-summary-stats" style="padding: 25px; background: #f8fafc; border-radius: 20px; border: 1px solid #e2e8f0; display: flex; justify-content: space-around; text-align: center; gap: 30px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 30px;">
                        <div style="flex: 1;">
                            <p style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 12px;">Presence Score</p>
                            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                                <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);"></div>
                                <h3 id="personal-present-percent" style="font-size: 28px; font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.02em;">—</h3>
                            </div>
                        </div>
                        <div style="width: 1px; background: #e2e8f0;"></div>
                        <div style="flex: 1;">
                            <p style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 12px;">Absence Score</p>
                            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                                <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);"></div>
                                <h3 id="personal-absent-percent" style="font-size: 28px; font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.02em;">—</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Daily Logs Table -->
                    <div id="modal-logs-container" style="display: none;">
                        <h4 style="font-size: 14px; font-weight: 700; color: #0f172a; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.05em;">Daily Attendance Log</h4>
                        <div style="background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden;">
                            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                                <thead style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                                    <tr>
                                        <th style="padding: 12px 15px; text-align: left; color: var(--text-muted); font-weight: 600;">Date</th>
                                        <th style="padding: 12px 15px; text-align: left; color: var(--text-muted); font-weight: 600;">In Time</th>
                                        <th style="padding: 12px 15px; text-align: left; color: var(--text-muted); font-weight: 600;">Out Time</th>
                                        <th style="padding: 12px 15px; text-align: left; color: var(--text-muted); font-weight: 600;">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="modal-logs-body">
                                    <!-- Populated dynamically -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jspdf.umd.min.js"></script>
    <script src="js/jspdf.plugin.autotable.min.js"></script>
    <script src="js/sidebar.js?v=SCORING-CLEANUP"></script>
    <script src="js/students.js?v=SCORING-CLEANUP"></script>
</body>

</html>
